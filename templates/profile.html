<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Set your fitness profile on NutriFit.">
    <title>NutriFit — Your Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <div class="logo">NutriFit</div>
</header>

<div class="form-container">

    <h2>Set Your Fitness Profile</h2>

    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}

    <form action="/calculate" method="post">

        <input type="number" name="age" placeholder="Age" min="1" max="120" required>

        <input type="number" name="height" step="any" placeholder="Height (cm)" min="50" max="280" required>

        <input type="number" step="any" name="weight" placeholder="Weight (kg)" min="10" max="500" required>

        <select name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <select name="activity">
            <option value="1.2">Sedentary (No exercise, mostly sitting)</option>
            <option value="1.375">Light (Walking / little activity, no gym)</option>
            <option value="1.55">Moderate (Gym 3-5 days/week)</option>
            <option value="1.725">Active (Gym daily or sports)</option>
            <option value="1.9">Very Active (Athlete / intense training)</option>
        </select>

        <button type="submit" class="primary-btn">Calculate Goals</button>

    </form>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
